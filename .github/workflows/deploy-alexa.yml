name: Deploy Alexa Skill

on:
  push:
    branches:
      - main
    paths:
      - 'alexa/**'
      - '.github/workflows/deploy-alexa.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ASK CLI
        run: npm install -g ask-cli

      # 1. Inyectar secretos de Firebase
      - name: Create Service Account File
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > alexa/lambda/service-account.json

      # 2. Despliegue de Metadatos (Manifest e Interaction Model)
      - name: Deploy Alexa Metadata
        env:
          ASK_ACCESS_TOKEN: ${{ secrets.ASK_ACCESS_TOKEN }}
          ASK_REFRESH_TOKEN: ${{ secrets.ASK_REFRESH_TOKEN }}
          ASK_VENDOR_ID: ${{ secrets.ASK_VENDOR_ID }}
        run: |
          mkdir -p ~/.ask
          echo "{
            \"profiles\": {
              \"default\": {
                \"token\": {
                  \"access_token\": \"$ASK_ACCESS_TOKEN\",
                  \"refresh_token\": \"$ASK_REFRESH_TOKEN\",
                  \"token_type\": \"bearer\",
                  \"expires_in\": 3600,
                  \"expires_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                },
                \"vendor_id\": \"$ASK_VENDOR_ID\"
              }
            }
          }" > ~/.ask/cli_config
          cd alexa
          ask deploy --target skill-metadata --ignore-hash

      # 3. Despliegue de Código (Directo a Amazon Git para evitar errores de infraestructura)
      - name: Deploy Alexa Code (Git)
        env:
          ALEXA_GIT_URL: ${{ secrets.ALEXA_HOSTED_GIT_URL }}
          ALEXA_GIT_USERNAME: ${{ secrets.ALEXA_GIT_USERNAME }}
          ALEXA_GIT_PASSWORD: ${{ secrets.ALEXA_GIT_PASSWORD }}
        run: |
          # Configurar Git para la inserción automática de credenciales
          git config --global user.email "deploy@github-actions.com"
          git config --global user.name "GitHub Actions"
          
          # URL-encode credentials to handle special characters (@, :, /, newlines, etc.)
          ENCODED_USER=$(printf "%s" "$ALEXA_GIT_USERNAME" | jq -sRr @uri)
          ENCODED_PASS=$(printf "%s" "$ALEXA_GIT_PASSWORD" | jq -sRr @uri)
          
          # Formatear la URL con credenciales de forma robusta
          AUTH_URL="https://${ENCODED_USER}:${ENCODED_PASS}@${ALEXA_GIT_URL#https://}"
          
          # Añadir el remoto de Alexa y empujar la rama main a su rama master
          git remote add alexa-hosted "$AUTH_URL"
          
          # Empujar solo la subcarpeta alexa (o el repo entero si la estructura es compatible)
          # En Alexa-hosted, el repo espera que la raíz sea el contenido de la carpeta 'alexa'
          # Usamos subtree push para enviar solo esa carpeta
          git subtree push --prefix alexa alexa-hosted master --force
